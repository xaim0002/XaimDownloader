name: Build Xaim App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Setup-Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android SDK Tools
      uses: android-actions/setup-android@v3

    - name: Install Critical Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y zip unzip autoconf automake libtool patch visualenv python3-pip

    - name: Install Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Inject Fresh Spec File
      run: |
        rm -f buildozer.spec
        buildozer init
        sed -i 's/^title =.*/title = Xaim Downloader/g' buildozer.spec
        sed -i 's/^package.name =.*/package.name = xaimdownloader/g' buildozer.spec
        sed -i 's/^package.domain =.*/package.domain = com.xaimtech/g' buildozer.spec
        sed -i 's/^requirements =.*/requirements = python3,kivy/g' buildozer.spec
        sed -i 's/^# android.permissions =.*/android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE/g' buildozer.spec
        sed -i 's/^# android.accept_sdk_license =.*/android.accept_sdk_license = y/g' buildozer.spec

    - name: Run Buildozer Compiler
      run: |
        export BUILDOZER_ALLOW_ORG_ERRORS=1
        buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Xaim-Downloader-APK
        path: bin/*.apk
