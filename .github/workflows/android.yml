name: Build Xaim App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libgstreamer-plugins-base1.0-dev libffi-dev libssl-dev autoconf automake libtool pkg-config cmake jnius openjdk-17-jdk unzip zip

    - name: Install Buildozer & Cython
      run: |
        pip3 install --user --upgrade pip
        pip3 install --user buildozer cython virtualenv
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Run Buildozer Compiler
      run: |
        export BUILDOZER_ALLOW_ORG_ERRORS=1
        buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Xaim-Downloader-APK
        path: bin/*.apk
